name: Publish to tap
description: >-
  Merge rendered Homebrew formula/cask files into yasyf/homebrew-tap and push.
  The single source of the cross-repo git mechanics — a calling repo only renders
  its own .rb files (formula/cask content is repo-specific) and hands them here.
  GoReleaser may render a cask, but it never publishes one directly: release-go
  passes dist/homebrew here only after its exact GitHub release is public. The
  same action also owns hand-rendered formulae, externally-built `.app` casks,
  and non-GoReleaser toolchains.

inputs:
  token:
    description: A PAT (or fine-grained token) with contents:write on yasyf/homebrew-tap.
    required: true
  dir:
    description: >-
      A local directory whose contents are merged into the tap root, e.g. a
      staging dir containing Formula/<name>.rb and/or Casks/<name>.rb.
    required: true
  message:
    description: Commit message for the tap.
    required: true
  delete-file:
    description: >-
      Optional exact tap-relative tracked file to delete in the same commit as
      the staged publish, e.g. Casks/old-name.rb. Absolute paths, traversal,
      globs, directories, and untracked files are rejected.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check out the tap
      uses: actions/checkout@v7
      with:
        repository: yasyf/homebrew-tap
        token: ${{ inputs.token }}
        path: .tap-publish

    - name: Merge, commit, and push
      shell: bash
      env:
        PUBLISH_DIR: ${{ inputs.dir }}
        PUBLISH_MSG: ${{ inputs.message }}
        DELETE_FILE: ${{ inputs.delete-file }}
      run: |
        set -euo pipefail
        [ -d "$PUBLISH_DIR" ] || { echo "::error::publish dir '$PUBLISH_DIR' does not exist"; exit 1; }
        "$GITHUB_ACTION_PATH/reject-retired-surfaces.sh" "$PUBLISH_DIR"
        # Merge the staged Formula//Casks/ files into the tap working tree.
        cp -R "$PUBLISH_DIR"/. .tap-publish/
        "$GITHUB_ACTION_PATH/delete-exact-file.sh" .tap-publish "$DELETE_FILE"
        "$GITHUB_ACTION_PATH/reject-retired-surfaces.sh" .tap-publish
        cd .tap-publish
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # `git add -A` then check the STAGED diff so brand-new (untracked) files
        # count as a change — the one place this logic lives, so it can't drift
        # or regress per repo.
        git add -A
        if git diff --cached --quiet; then
          echo "tap already up to date; nothing to push"
          exit 0
        fi
        git commit -m "$PUBLISH_MSG"
        for attempt in 1 2 3; do
          if git push; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "::error::tap push lost three concurrent-update races"
            exit 1
          fi
          git fetch origin main
          git rebase origin/main
        done
