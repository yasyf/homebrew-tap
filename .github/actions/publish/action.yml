name: Publish to tap
description: >-
  Merge rendered Homebrew formula/cask files into yasyf/homebrew-tap and push.
  The single source of the cross-repo git mechanics — a calling repo only renders
  its own .rb files (formula/cask content is repo-specific) and hands them here.
  Go repos that release plain binaries should use goreleaser's built-in cask
  publishing instead; this action is for artifacts goreleaser can't serve — a
  formula with a `service` block or native-Linux build, an externally-built
  `.app`, or a non-goreleaser toolchain (release-swift.yml's binary cask).

inputs:
  token:
    description: A PAT (or fine-grained token) with contents:write on yasyf/homebrew-tap.
    required: true
  dir:
    description: >-
      A local directory whose contents are merged into the tap root, e.g. a
      staging dir containing Formula/<name>.rb and/or Casks/<name>.rb.
    required: true
  message:
    description: Commit message for the tap.
    required: true

runs:
  using: composite
  steps:
    - name: Check out the tap
      uses: actions/checkout@v7
      with:
        repository: yasyf/homebrew-tap
        token: ${{ inputs.token }}
        path: .tap-publish

    - name: Merge, commit, and push
      shell: bash
      env:
        PUBLISH_DIR: ${{ inputs.dir }}
        PUBLISH_MSG: ${{ inputs.message }}
      run: |
        set -euo pipefail
        [ -d "$PUBLISH_DIR" ] || { echo "::error::publish dir '$PUBLISH_DIR' does not exist"; exit 1; }
        if [ -e "$PUBLISH_DIR/Casks/fusekit-holder.rb" ] || \
           [ -e "$PUBLISH_DIR/Casks/cc-notes-holder.rb" ] || \
           [ -e "$PUBLISH_DIR/Casks/cc-notes-helper.rb" ] || \
           grep -RIlE 'fusekit-holder|com\.yasyf\.fusekit-holder|cc-notes-holder|CCNotesHolder\.app|cc-notes-helper|com\.yasyf\.cc-notes\.helper|CCNotesHelper\.app' \
             "$PUBLISH_DIR/Casks" "$PUBLISH_DIR/Formula" 2>/dev/null | grep -q .; then
          echo "::error::refusing to publish a standalone FuseKit runtime app"
          exit 1
        fi
        # Merge the staged Formula//Casks/ files into the tap working tree.
        cp -R "$PUBLISH_DIR"/. .tap-publish/
        if [ -e .tap-publish/Casks/fusekit-holder.rb ] || \
           [ -e .tap-publish/Casks/cc-notes-holder.rb ] || \
           [ -e .tap-publish/Casks/cc-notes-helper.rb ] || \
           grep -RIlE 'fusekit-holder|com\.yasyf\.fusekit-holder|cc-notes-holder|CCNotesHolder\.app|cc-notes-helper|com\.yasyf\.cc-notes\.helper|CCNotesHelper\.app' \
             .tap-publish/Casks .tap-publish/Formula 2>/dev/null | grep -q .; then
          echo "::error::a standalone FuseKit runtime app exists in the merged tap"
          exit 1
        fi
        cd .tap-publish
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # `git add -A` then check the STAGED diff so brand-new (untracked) files
        # count as a change — the one place this logic lives, so it can't drift
        # or regress per repo.
        git add -A
        if git diff --cached --quiet; then
          echo "tap already up to date; nothing to push"
          exit 0
        fi
        git commit -m "$PUBLISH_MSG"
        git push
