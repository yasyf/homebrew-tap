name: Sign, notarize, package a macOS CLI binary
description: >-
  The shared tail for shipping a bare Mach-O CLI as a Homebrew cask: Developer ID
  codesign + notarize it via $MACOS_CODESIGN_SCRIPT (the canonical macos-codesign.sh
  — fail-closed identity/team verification, 3x submit retry, fail-loud on a
  non-Accepted verdict),
  ditto-zip it into dist/<name>-<tag>-<platform>.zip with a .sha256 and a
  checksums.txt for caller-owned release publication.
  Outputs the zip's sha256 for the cask render. A bare binary cannot be stapled
  (stapler is .app/.dmg/.pkg-only); Gatekeeper verifies the notarization against
  the cdhash online, same as the Go pipeline's quill path. Language-agnostic —
  any Mach-O CLI (Swift, Rust, C) works. Signing is darwin-only: callers must pass
  a darwin platform (the default darwin-universal, or a per-arch darwin-arm64 /
  darwin-x64) — release-bun.yml only invokes this on its darwin matrix legs, never
  the linux ones. Requires the import-developer-id action to have run successfully.
  Pair with
  render-formula (Casks/<name>.rb, filling __SHA__) + publish.

inputs:
  binary:
    description: path to the built CLI binary
    required: true
  name:
    description: cask/asset base name (the zip is dist/<name>-<tag>-<platform>.zip)
    required: true
  tag:
    description: release tag the asset belongs to (explicit — github.ref_name is wrong under auto-tag)
    required: true
  platform:
    description: >-
      artifact platform suffix — the zip is dist/<name>-<tag>-<platform>.zip.
      Also the codesign slice label (dashes to underscores); darwin-prefixed
      values engage signing. Default preserves the Swift family's universal naming.
    required: false
    default: "darwin-universal"
outputs:
  sha256:
    description: sha256 of the shipped zip (feed to render-formula as __SHA__)
    value: ${{ steps.pkg.outputs.sha256 }}
  zip:
    description: path to the shipped zip asset
    value: ${{ steps.pkg.outputs.zip }}

runs:
  using: composite
  steps:
    - id: pkg
      shell: bash
      env:
        BINARY: ${{ inputs.binary }}
        NAME: ${{ inputs.name }}
        TAG: ${{ inputs.tag }}
        PLATFORM: ${{ inputs.platform }}
      run: |
        set -euo pipefail
        test -f "$BINARY" || { echo "::error::binary '$BINARY' not found"; exit 1; }
        test -n "${MACOS_CODESIGN_SCRIPT:-}" || { echo "::error::MACOS_CODESIGN_SCRIPT unset — run the import-developer-id action first"; exit 1; }
        test -n "${MACOS_SIGN_IDENTITY:-}" || { echo "::error::MACOS_SIGN_IDENTITY unset — refusing to package an unsigned Darwin binary"; exit 1; }
        test -n "${TEAM_ID:-}" || { echo "::error::TEAM_ID unset — refusing to package a Darwin binary without an exact team"; exit 1; }
        test -s "${MACOS_NOTARY_KEY_FILE:-}" || { echo "::error::MACOS_NOTARY_KEY_FILE missing — refusing to package an unnotarized Darwin binary"; exit 1; }
        test -n "${MACOS_NOTARY_KEY_ID:-}" || { echo "::error::MACOS_NOTARY_KEY_ID unset — refusing to package an unnotarized Darwin binary"; exit 1; }
        test -n "${MACOS_NOTARY_ISSUER:-}" || { echo "::error::MACOS_NOTARY_ISSUER unset — refusing to package an unnotarized Darwin binary"; exit 1; }
        case "$MACOS_SIGN_IDENTITY" in
          *"($TEAM_ID)") ;;
          *) echo "::error::MACOS_SIGN_IDENTITY '$MACOS_SIGN_IDENTITY' does not match TEAM_ID '$TEAM_ID'"; exit 1 ;;
        esac
        case "$PLATFORM" in
          darwin-*) ;;
          *) echo "::error::sign-notarize-binary only accepts a darwin-* platform (got '$PLATFORM')"; exit 1 ;;
        esac

        # Sign + notarize in one call. The script keys on the darwin_ prefix only,
        # so a per-arch slice label (darwin_arm64) is behavior-identical to the
        # universal darwin_all — it names the slice being signed honestly.
        slice="${PLATFORM//-/_}"
        bash "$MACOS_CODESIGN_SCRIPT" "$BINARY" "$slice"
        codesign --verify --strict --verbose=2 "$BINARY"
        actual_team="$(codesign -dvv "$BINARY" 2>&1 | sed -n 's/^TeamIdentifier=//p' | head -n1)"
        [ "$actual_team" = "$TEAM_ID" ] || {
          echo "::error::refusing to package $BINARY: TeamIdentifier '$actual_team' != '$TEAM_ID'"; exit 1;
        }

        # ditto -c -k archives the bare binary at the zip root — exactly where the
        # cask's `binary` stanza expects it.
        mkdir -p dist
        zip="dist/${NAME}-${TAG}-${PLATFORM}.zip"
        ditto -c -k "$BINARY" "$zip"
        sha="$(shasum -a 256 "$zip" | awk '{print $1}')"
        # Basename manifest so `shasum -c` works beside the downloaded asset.
        (cd dist && shasum -a 256 "${zip##*/}" > "${zip##*/}.sha256")
        (cd dist && shasum -a 256 -- *.zip > checksums.txt)
        echo "sha256=$sha" >> "$GITHUB_OUTPUT"
        echo "zip=$zip" >> "$GITHUB_OUTPUT"
        echo "sign-notarize-binary: $zip ($sha)"
