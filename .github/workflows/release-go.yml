# The single reusable release workflow for every Go repo in the fleet. It owns the
# whole job: verify-tag-on-main (or auto-tag), toolchain setup, Developer ID import,
# artifact-only GoReleaser, exact draft staging, release-ID publication, and Homebrew
# publication. Each repo's release.yml collapses to a `uses:` + a few `with:` inputs.
#
# How a repo ships is decided by its in-repo .goreleaser.yaml plus these inputs:
#   • cask (default): .goreleaser.yaml has a `homebrew_casks:` block. GoReleaser
#     renders it under dist/homebrew; this workflow publishes it only after the exact
#     GitHub release is public. (cc-merge, reposync, cc-review, cc-orchestrate, slop-cop)
#   • formula: set render-formula:true + formula-template/formula-name. GoReleaser
#     builds with NO homebrew block; this workflow renders and publishes the .rb.
#     (ccx, synckitd)
#   • signing: signer:quill (default, ubuntu, full-chain p12) or signer:codesign
#     (a macOS runner; the import-developer-id action wires native codesign via a
#     goreleaser post-hook calling {{ .Env.MACOS_CODESIGN_SCRIPT }}).
#
# Callers MUST use `secrets: inherit` (forwards HOMEBREW_TAP_TOKEN + the five MACOS_*).
# Minimal callers pin this workflow by exact commit and inherit release credentials.
#   formula:  with: { render-formula: true, formula-template: .github/formula/x.rb.tmpl, formula-name: x }
#   cgo cask: with: { runner: macos-latest, signer: codesign, setup-zig: "0.16.0" }

name: release-go (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: runner for the release job (ubuntu-latest for quill/pure-Go; a macos runner for codesign/cgo)
        type: string
        default: ubuntu-latest
      go-version-file:
        description: passed to actions/setup-go
        type: string
        default: go.mod
      signer:
        description: "quill (ubuntu, goreleaser notarize) or codesign (macOS, native codesign+notarytool)"
        type: string
        default: quill
      setup-bun:
        description: install bun before goreleaser (for a go:embed SPA prebuild hook)
        type: boolean
        default: false
      setup-zig:
        description: 'Zig version to install (e.g. "0.16.0"); empty to skip'
        type: string
        default: ""
      auto-tag:
        description: 'release on push to main with a monotonic v0.1.<run_number> tag (skips verify-tag-on-main)'
        type: boolean
        default: false
      pre-build:
        description: 'repo-specific runner setup run before goreleaser (install toolchains, echo env to $GITHUB_ENV)'
        type: string
        default: ""
      render-formula:
        description: 'render a hand-maintained Formula/<name>.rb after goreleaser and publish it (for formulae goreleaser brews cannot express)'
        type: boolean
        default: false
      formula-template:
        description: path to the .rb template (required when render-formula is true)
        type: string
        default: ""
      formula-name:
        description: formula/archive base name (required when render-formula is true)
        type: string
        default: ""
      plugin-manifest:
        description: 'plugin.json path whose "version" must equal the tag (opt-in tag/manifest coherence; empty disables). Only for plugin repos whose release tag tracks the manifest version.'
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify the tag is on main
        if: ${{ !inputs.auto-tag }}
        uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          plugin-manifest: ${{ inputs.plugin-manifest }}

      - name: Auto-tag (push-to-main release)
        id: auto-tag
        if: ${{ inputs.auto-tag }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          test -n "$DEFAULT_BRANCH" || { echo "::error::repository default branch is unknown"; exit 1; }
          # Reruns of a failed release keep the same run_number, so this must be
          # idempotent: a tag already at THIS commit is reused (a release that died
          # after the tag — e.g. goreleaser on a missing secret — stays rerunnable),
          # a tag at a DIFFERENT commit is a real conflict that fails loud. We check
          # both the fetched clone and origin, and never retag or force.
          TAG="v0.1.${{ github.run_number }}"
          SHA="$(git rev-parse HEAD)"
          git fetch --no-tags origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          default_ref="refs/remotes/origin/${DEFAULT_BRANCH}"
          git merge-base --is-ancestor "$SHA" "$default_ref" || {
            echo "::error::auto-tag release commit $SHA is not an ancestor of $DEFAULT_BRANCH"
            exit 1
          }
          existing=""
          if local_sha="$(git rev-parse -q --verify "refs/tags/$TAG^{commit}")"; then
            existing="$local_sha"
          fi
          # A ^{} refspec peels an annotated tag to its commit; a lightweight one
          # (what this step creates) yields the plain line, whose sha is the commit.
          remote_ls="$(git ls-remote origin "refs/tags/$TAG" "refs/tags/$TAG^{}" || true)"
          if [ -n "$remote_ls" ]; then
            remote_sha="$(printf '%s\n' "$remote_ls" | awk '/\^\{\}$/ {print $1}' | tail -n1)"
            [ -n "$remote_sha" ] || remote_sha="$(printf '%s\n' "$remote_ls" | awk 'NR==1 {print $1}')"
            if [ -n "$existing" ] && [ "$existing" != "$remote_sha" ]; then
              echo "::error::tag $TAG is $existing locally but $remote_sha on origin"; exit 1
            fi
            existing="$remote_sha"
          fi
          if [ -n "$existing" ]; then
            if [ "$existing" != "$SHA" ]; then
              echo "::error::tag $TAG already exists at $existing but this run targets $SHA; refusing to retag (delete the stale tag or re-run from a fresh push)"; exit 1
            fi
            echo "tag $TAG already exists at $SHA; reusing it (idempotent re-run)"
          else
            git tag "$TAG" "$SHA"
            git push origin "$TAG"
          fi
          echo "GORELEASER_CURRENT_TAG=$TAG" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve the exact release tag
        id: tag
        env:
          AUTO_TAG: ${{ steps.auto-tag.outputs.tag }}
          GENERATED: ${{ inputs.auto-tag }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$GENERATED" = true ]; then
            tag="$AUTO_TAG"
          else
            tag="$PUSH_TAG"
          fi
          semver='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          [[ "$tag" =~ $semver ]] || { echo "::error::invalid release tag '$tag'"; exit 1; }
          core="${tag%%+*}"
          prerelease=false
          if [[ "$core" == *-* ]]; then prerelease=true; fi
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@v2

      - if: ${{ inputs.setup-zig != '' }}
        uses: xyzzylabs/setup-zig@v1
        with:
          version: ${{ inputs.setup-zig }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Require release signing credentials
        env:
          SIGNER: ${{ inputs.signer }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          case "$SIGNER" in
            quill|codesign) ;;
            *) echo "::error::unknown signer '$SIGNER'"; exit 1 ;;
          esac
          test -n "$MACOS_SIGN_P12" || { echo "::error::MACOS_SIGN_P12 is required; refusing an unsigned release"; exit 1; }
          test -n "$MACOS_SIGN_PASSWORD" || { echo "::error::MACOS_SIGN_PASSWORD is required; refusing an unsigned release"; exit 1; }
          test -n "$MACOS_NOTARY_KEY" || { echo "::error::MACOS_NOTARY_KEY is required; refusing an unnotarized release"; exit 1; }
          test -n "$MACOS_NOTARY_KEY_ID" || { echo "::error::MACOS_NOTARY_KEY_ID is required; refusing an unnotarized release"; exit 1; }
          test -n "$MACOS_NOTARY_ISSUER_ID" || { echo "::error::MACOS_NOTARY_ISSUER_ID is required; refusing an unnotarized release"; exit 1; }

      - name: Repo-specific pre-build setup
        if: ${{ inputs.pre-build != '' }}
        run: ${{ inputs.pre-build }}

      - name: Import Developer ID certificate
        if: ${{ inputs.signer == 'codesign' }}
        id: developer-id
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Verify Developer ID import
        if: ${{ inputs.signer == 'codesign' }}
        env:
          SIGNED: ${{ steps.developer-id.outputs.signed }}
          IDENTITY: ${{ steps.developer-id.outputs.identity }}
          TEAM_ID: ${{ steps.developer-id.outputs.team-id }}
        run: |
          set -euo pipefail
          [ "$SIGNED" = "true" ] || { echo "::error::Developer ID import did not report signed=true"; exit 1; }
          test -n "$IDENTITY" || { echo "::error::Developer ID import returned no identity"; exit 1; }
          test -n "$TEAM_ID" || { echo "::error::Developer ID import returned no Team ID"; exit 1; }
          case "$IDENTITY" in
            *"($TEAM_ID)") ;;
            *) echo "::error::Developer ID identity '$IDENTITY' does not match Team ID '$TEAM_ID'"; exit 1 ;;
          esac

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Build release artifacts without publishing
        run: goreleaser release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Render the formula
        if: ${{ inputs.render-formula && steps.tag.outputs.prerelease == 'false' }}
        uses: yasyf/homebrew-tap/.github/actions/render-formula@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          template: ${{ inputs.formula-template }}
          name: ${{ inputs.formula-name }}
          output: Formula/${{ inputs.formula-name }}.rb
          version: ${{ steps.tag.outputs.version }}

      - name: Verify Homebrew staging
        if: ${{ steps.tag.outputs.prerelease == 'false' }}
        env:
          FORMULA_NAME: ${{ inputs.formula-name }}
          RENDER_FORMULA: ${{ inputs.render-formula }}
        run: |
          set -euo pipefail
          expected="$RUNNER_TEMP/expected-homebrew-files"
          actual="$RUNNER_TEMP/actual-homebrew-files"
          if [ "$RENDER_FORMULA" = true ]; then
            test -n "$FORMULA_NAME" || { echo "::error::formula-name is required"; exit 1; }
            dir=tap-staging
            jq -r '.[] | select(.type == "Homebrew Cask" or .type == "Homebrew Formula") | .path' \
              dist/artifacts.json | sort > "$expected"
            if [ -s "$expected" ]; then
              echo "::error::render-formula releases must not also define GoReleaser Homebrew output"
              exit 1
            fi
            printf '%s\n' "tap-staging/Formula/${FORMULA_NAME}.rb" > "$expected"
          else
            dir=dist/homebrew
            jq -r '.[] | select(.type == "Homebrew Cask" or .type == "Homebrew Formula") | .path' \
              dist/artifacts.json | sort > "$expected"
          fi
          test -d "$dir" || { echo "::error::Homebrew staging directory '$dir' is missing"; exit 1; }
          test -s "$expected" || { echo "::error::Homebrew artifact set is empty"; exit 1; }
          find "$dir" -type f | sort > "$actual"
          diff -u "$expected" "$actual" || {
            echo "::error::Homebrew staging contains unclassified or missing files"
            exit 1
          }

      - name: Record the exact release asset manifest
        uses: yasyf/homebrew-tap/.github/actions/go-release-manifest@eb73d87f6b53a71f49d846ec28756ea243970d45
        with:
          artifacts: dist/artifacts.json
          output: ${{ runner.temp }}/go-release-assets

      - name: Verify local release checksums
        run: |
          set -euo pipefail
          while IFS= read -r checksum; do
            (
              cd "$(dirname "$checksum")"
              shasum -a 256 -c "$(basename "$checksum")"
            )
          done < <(jq -r '.[] | select(.type == "Checksum") | .path' dist/artifacts.json)

      - name: Stage and verify the complete draft release
        id: draft
        uses: yasyf/homebrew-tap/.github/actions/stage-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5
        with:
          token: ${{ github.token }}
          tag: ${{ steps.tag.outputs.tag }}
          manifest: ${{ runner.temp }}/go-release-assets
          title: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}

      - name: Publish the verified release
        uses: yasyf/homebrew-tap/.github/actions/publish-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5
        with:
          token: ${{ github.token }}
          release-id: ${{ steps.draft.outputs['release-id'] }}
          tag: ${{ steps.tag.outputs.tag }}
          manifest: ${{ runner.temp }}/go-release-assets
          prerelease: ${{ steps.tag.outputs.prerelease }}
          make-latest: ${{ steps.tag.outputs.prerelease == 'false' }}

      - name: Publish the generated Homebrew delivery
        if: ${{ !inputs.render-formula && steps.tag.outputs.prerelease == 'false' }}
        uses: yasyf/homebrew-tap/.github/actions/publish@9ca67392d45d66b6ae01e262383c8f3138d56f5e
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: dist/homebrew
          message: "${{ github.event.repository.name }} ${{ steps.tag.outputs.tag }}"

      - name: Publish the rendered formula to the tap
        if: ${{ inputs.render-formula && steps.tag.outputs.prerelease == 'false' }}
        uses: yasyf/homebrew-tap/.github/actions/publish@9ca67392d45d66b6ae01e262383c8f3138d56f5e
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "${{ inputs.formula-name }} ${{ steps.tag.outputs.tag }}"
