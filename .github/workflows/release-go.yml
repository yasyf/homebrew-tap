# The single reusable release workflow for every Go repo in the fleet. It owns the
# whole job: verify-tag-on-main (or auto-tag), toolchain setup, Developer ID import,
# `goreleaser release`, and — for the rich-formula repos goreleaser's brews block
# can't express — render-formula + publish. Each repo's release.yml collapses to a
# `uses:` + a few `with:` inputs; all the logic lives here, pinned `@v1`.
#
# How a repo ships is decided by its in-repo .goreleaser.yaml plus these inputs:
#   • cask (default): .goreleaser.yaml has a `homebrew_casks:` block; goreleaser
#     publishes it. (cc-merge, reposync, cc-review, cc-orchestrate, slop-cop)
#   • formula: set render-formula:true + formula-template/formula-name; goreleaser
#     builds with NO homebrew block, then render-formula + publish ship the .rb.
#     (ccx, synckitd)
#   • signing: signer:quill (default, ubuntu, full-chain p12) or signer:codesign
#     (a macOS runner; the import-developer-id action wires native codesign via a
#     goreleaser post-hook calling {{ .Env.MACOS_CODESIGN_SCRIPT }}).
#
# Callers MUST use `secrets: inherit` (forwards HOMEBREW_TAP_TOKEN + the five MACOS_*).
# Minimal callers:
#   jobs: { release: { uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@v1, secrets: inherit } }
#   formula:  with: { render-formula: true, formula-template: .github/formula/x.rb.tmpl, formula-name: x }
#   cgo cask: with: { runner: macos-latest, signer: codesign, setup-zig: "0.16.0" }

name: release-go (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: runner for the release job (ubuntu-latest for quill/pure-Go; a macos runner for codesign/cgo)
        type: string
        default: ubuntu-latest
      go-version-file:
        description: passed to actions/setup-go
        type: string
        default: go.mod
      signer:
        description: "quill (ubuntu, goreleaser notarize) or codesign (macOS, native codesign+notarytool)"
        type: string
        default: quill
      setup-bun:
        description: install bun before goreleaser (for a go:embed SPA prebuild hook)
        type: boolean
        default: false
      setup-zig:
        description: 'Zig version to install (e.g. "0.16.0"); empty to skip'
        type: string
        default: ""
      auto-tag:
        description: 'release on push to main with a monotonic v0.1.<run_number> tag (skips verify-tag-on-main)'
        type: boolean
        default: false
      pre-build:
        description: 'repo-specific runner setup run before goreleaser (install toolchains, echo env to $GITHUB_ENV)'
        type: string
        default: ""
      render-formula:
        description: 'render a hand-maintained Formula/<name>.rb after goreleaser and publish it (for formulae goreleaser brews cannot express)'
        type: boolean
        default: false
      formula-template:
        description: path to the .rb template (required when render-formula is true)
        type: string
        default: ""
      formula-name:
        description: formula/archive base name (required when render-formula is true)
        type: string
        default: ""
      plugin-manifest:
        description: 'plugin.json path whose "version" must equal the tag (opt-in tag/manifest coherence; empty disables). Only for plugin repos whose release tag tracks the manifest version.'
        type: string
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify the tag is on main
        if: ${{ !inputs.auto-tag }}
        uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@v1
        with:
          plugin-manifest: ${{ inputs.plugin-manifest }}

      - name: Auto-tag (push-to-main release)
        if: ${{ inputs.auto-tag }}
        run: |
          set -euo pipefail
          # Reruns of a failed release keep the same run_number, so this must be
          # idempotent: a tag already at THIS commit is reused (a release that died
          # after the tag — e.g. goreleaser on a missing secret — stays rerunnable),
          # a tag at a DIFFERENT commit is a real conflict that fails loud. We check
          # both the fetched clone and origin, and never retag or force.
          TAG="v0.1.${{ github.run_number }}"
          SHA="$(git rev-parse HEAD)"
          existing=""
          if local_sha="$(git rev-parse -q --verify "refs/tags/$TAG^{commit}")"; then
            existing="$local_sha"
          fi
          # A ^{} refspec peels an annotated tag to its commit; a lightweight one
          # (what this step creates) yields the plain line, whose sha is the commit.
          remote_ls="$(git ls-remote origin "refs/tags/$TAG" "refs/tags/$TAG^{}" || true)"
          if [ -n "$remote_ls" ]; then
            remote_sha="$(printf '%s\n' "$remote_ls" | awk '/\^\{\}$/ {print $1}' | tail -n1)"
            [ -n "$remote_sha" ] || remote_sha="$(printf '%s\n' "$remote_ls" | awk 'NR==1 {print $1}')"
            if [ -n "$existing" ] && [ "$existing" != "$remote_sha" ]; then
              echo "::error::tag $TAG is $existing locally but $remote_sha on origin"; exit 1
            fi
            existing="$remote_sha"
          fi
          if [ -n "$existing" ]; then
            if [ "$existing" != "$SHA" ]; then
              echo "::error::tag $TAG already exists at $existing but this run targets $SHA; refusing to retag (delete the stale tag or re-run from a fresh push)"; exit 1
            fi
            echo "tag $TAG already exists at $SHA; reusing it (idempotent re-run)"
          else
            git tag "$TAG" "$SHA"
            git push origin "$TAG"
          fi
          echo "GORELEASER_CURRENT_TAG=$TAG" >> "$GITHUB_ENV"

      - if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@v2

      - if: ${{ inputs.setup-zig != '' }}
        uses: xyzzylabs/setup-zig@v1
        with:
          version: ${{ inputs.setup-zig }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Repo-specific pre-build setup
        if: ${{ inputs.pre-build != '' }}
        run: ${{ inputs.pre-build }}

      - name: Import Developer ID certificate
        if: ${{ inputs.signer == 'codesign' }}
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@v1
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      # install-only puts the goreleaser binary on PATH so the next step can wrap
      # `release` in a retry loop — a marketplace action step can't be retried in bash.
      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Release (retry past flaky notarization)
        run: |
          set -euo pipefail
          # notarytool/quill is the flakiest step and runs BEFORE goreleaser publishes the GitHub
          # release or pushes the tap, so the common transient case (a notarize blip) retries
          # cleanly — nothing was published yet. A rarer failure mid-publish retries too; that
          # asset re-upload is idempotent only if the repo's .goreleaser.yaml sets
          # release.replace_existing_artifacts: true (the repo-bootstrap template does) — otherwise
          # the retry surfaces a 422 and the release must be re-run after deleting the partial one.
          # Retry up to 3x with backoff.
          attempt=1
          while :; do
            if goreleaser release --clean; then
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::goreleaser release failed after 3 attempts"; exit 1
            fi
            echo "::warning::goreleaser release failed (attempt $attempt/3); retrying in $((attempt * 60))s"
            sleep "$((attempt * 60))"
            attempt=$((attempt + 1))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # quill path (ubuntu) reads these; the .goreleaser.yaml notarize block gates on
          # MACOS_SIGN_P12 being non-empty. The codesign path instead reads
          # MACOS_SIGN_IDENTITY / MACOS_NOTARY_* / MACOS_CODESIGN_SCRIPT from $GITHUB_ENV
          # (set by the import-developer-id step above), so it ignores these.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Render the formula
        if: ${{ inputs.render-formula }}
        uses: yasyf/homebrew-tap/.github/actions/render-formula@v1
        with:
          template: ${{ inputs.formula-template }}
          name: ${{ inputs.formula-name }}
          output: Formula/${{ inputs.formula-name }}.rb

      - name: Publish the formula to the tap
        if: ${{ inputs.render-formula }}
        uses: yasyf/homebrew-tap/.github/actions/publish@v1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "${{ inputs.formula-name }} ${{ github.ref_name }}"
